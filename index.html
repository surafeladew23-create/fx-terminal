<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Dashboard | Elite Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --bg: #05070a; --card: #0f1117; --accent: #0260FD; 
            --green: #00c805; --red: #ff3b30; --text: #f0f6fc; --dim: #8b949e; 
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 15px; margin: 0; 
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: var(--accent); font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }
        
        /* Dashboard Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #1c2128; }
        .stat-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }

        .main-card { background: var(--card); border-radius: 16px; border: 1px solid #1c2128; padding: 20px; margin-bottom: 20px; }
        h3 { font-size: 0.9rem; margin-top: 0; color: var(--text); }

        input, select, textarea { 
            background: #05070a; border: 1px solid #30363d; color: white; 
            padding: 12px; width: 100%; margin: 8px 0; border-radius: 8px; font-size: 0.9rem;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-primary { 
            background: var(--accent); color: white; border: none; 
            padding: 14px; width: 100%; font-weight: 700; border-radius: 8px; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-secondary { background: #1c2128; color: var(--dim); border: none; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: 10px; width: 100%; }

        /* History Items */
        .history-item { 
            background: #161b22; padding: 15px; border-radius: 10px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .pnl-tag { font-weight: 700; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; }
        .win { background: rgba(0, 200, 5, 0.1); color: var(--green); }
        .loss { background: rgba(255, 59, 48, 0.1); color: var(--red); }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
        .modal { background: var(--card); border: 1px solid var(--accent); padding: 25px; width: 80%; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="overlay" id="ruleModal">
    <div class="modal">
        <div style="font-size: 2rem; margin-bottom: 10px;">📊</div>
        <h2 style="margin:0 0 10px 0; font-size: 1.1rem;">Ready to execute?</h2>
        <p style="color:var(--dim); font-size: 0.85rem; line-height: 1.5;">Ensure MSS is confirmed on 1H and you are trading within your S/D zones.</p>
        <button class="btn-primary" onclick="document.getElementById('ruleModal').style.display='none'">START SESSION</button>
    </div>
</div>

<div id="capture">
    <div class="header">
        <div class="logo">FXREPLAY<span style="color:white; font-weight:400;">_CLONE</span></div>
        <div style="font-size: 0.7rem; color: var(--dim);" id="currentDate"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Equity</div>
            <div class="stat-value" id="totalPnl">$0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="winRate">0%</div>
        </div>
    </div>

    <div class="main-card">
        <h3>Log New Execution</h3>
        <div style="display: flex; gap: 8px;">
            <select id="session" style="flex:1;"><option value="london">London</option><option value="ny">New York</option></select>
            <input type="number" id="amount" placeholder="P/L ($)" style="flex:1;">
        </div>
        <textarea id="note" rows="2" placeholder="Describe the setup..."></textarea>
        <button class="btn-primary" onclick="addTrade()">COMMIT TRADE</button>
    </div>

    <h3 style="padding-left: 5px;">Performance History</h3>
    <div id="history"></div>
</div>

<button class="btn-secondary" onclick="exportCSV()">EXPORT CSV DATA</button>
<button class="btn-secondary" style="color: var(--red);" onclick="resetData()">RESET ALL DATA</button>

<script>
    let trades = JSON.parse(localStorage.getItem('fx_v9')) || [];
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString();

    function addTrade() {
        const val = parseFloat(document.getElementById('amount').value);
        if(isNaN(val)) return;
        trades.push({
            pnl: val,
            session: document.getElementById('session').value,
            note: document.getElementById('note').value || "No context provided",
            date: new Date().toLocaleDateString()
        });
        localStorage.setItem('fx_v9', JSON.stringify(trades));
        document.getElementById('amount').value = "";
        document.getElementById('note').value = "";
        update();
    }

    function update() {
        const total = trades.reduce((a, b) => a + b.pnl, 0);
        const wins = trades.filter(t => t.pnl > 0).length;
        const wr = trades.length > 0 ? ((wins / trades.length) * 100).toFixed(0) : 0;

        document.getElementById('totalPnl').innerText = `$${total.toFixed(2)}`;
        document.getElementById('totalPnl').style.color = total >= 0 ? 'var(--green)' : 'var(--red)';
        document.getElementById('winRate').innerText = `${wr}%`;

        document.getElementById('history').innerHTML = trades.slice().reverse().map(t => `
            <div class="history-item">
                <div>
                    <div style="font-size: 0.85rem; font-weight: 600;">${t.session.toUpperCase()} SESSION</div>
                    <div style="font-size: 0.7rem; color: var(--dim);">${t.note}</div>
                </div>
                <div class="pnl-tag ${t.pnl >= 0 ? 'win' : 'loss'}">
                    ${t.pnl >= 0 ? '+' : ''}${t.pnl}
                </div>
            </div>
        `).join('');
    }

    function exportCSV() {
        let csv = "Date,Session,PnL,Notes\n";
        trades.forEach(t => csv += `${t.date},${t.session},${t.pnl},"${t.note}"\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'journal_export.csv');
        a.click();
    }

    function resetData() { if(confirm("Delete all history?")) { localStorage.removeItem('fx_v9'); trades=[]; update(); } }
    update();
</script>
</body>
</html>
